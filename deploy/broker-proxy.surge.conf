# ════════════════════════════════════════════════════════════════════
# 券商代理规则(futu + 长桥)— 大陆走代理才能拉行情/交易
# ────────────────────────────────────────────────────────────────────
# 用法:
#   1. 把下面 [Rule] 段的规则贴进 Surge 配置的 [Rule] 段顶部(在 FINAL 之前);
#      或存成 RULE-SET 文件用 RULE-SET,<path>,PROXY 引用。
#   2. 把策略名 `PROXY` 改成你自己的代理策略 / 策略组名(如 节点 / 香港 / Proxy)。
#   3. ★关键:futu OpenD / 长桥 SDK 是本地进程,不一定读系统代理 →
#      必须开 Surge 的【增强模式 Enhanced Mode (TUN)】才能捕获它们的出站走规则。
#      Surge Mac: 设置 → Enhanced Mode 打开。
#   4. 改完重启 OpenD(和重连长桥),让新连接走代理。
# ════════════════════════════════════════════════════════════════════

[Rule]

# ───────────────────────── Futu / Moomoo ─────────────────────────
