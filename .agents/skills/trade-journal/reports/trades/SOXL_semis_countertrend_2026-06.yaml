thesis: >
  名义逆势 bet（判断半导体破位），实际演变成约 3 周（5/17–6/5）在 SOXL/SOXS 多空两边
  反复横跳的对敲，62 笔成交、~$80K 毛周转。方向最终兑现（半导体崩），但净亏 $1,630
  （SOXS -1309 + SOXL -322）≈ 账户 7.4%。复盘卡"赌对了"的叙事美化了现实——真相是
  多空横跳 + 在下跌的 3x ETF 里反复摊低成本。这是 [[feedback_user_counter_trend_pattern]]
  记录的重复弱点又一次、且更严重地发作：方向感不是病灶，过度交易+工具错配+情绪执行才是。

# ============ 复盘（核心）============
review:
  scores:                     # 1-5
    entry_quality: 2          # 趋势未掉头就去 fade 强势，无确认信号、入场太早
    execution: 1              # 多空横跳 + 最大痛苦点投降交枪 + 反手
    management: 1             # 3x 每日重置 ETF 装多日观点 + 越跌越加 + 两头同付 decay
    result: 1                 # 净亏 $1,630（≈账户7.4%）（方向对，执行毁）
  verdict: "名义看对方向，实际输在过度交易+工具错配+情绪执行 — 判断力不是病灶"

mistake_tags:                 # 见 SKILL.md Taxonomy
  - code: M02
    name: 摊低成本（实锤）
    detail: "6/5 SOXL 下跌中 BUY 218.95→213.33→207.63 三次加仓救自己，再 198.21 投降"
  - code: M08
    name: 越界/工具错配
    detail: "用 3x 每日重置杠杆 ETF 承载多日观点；多空两边同时持有 → decay 双杀"
  - code: M04
    name: 嘴硬止损/转折点投降
    detail: "在底部 198.21 交枪，止损纪律在情绪峰值崩溃"
  - code: M01
    name: 反手接飞刀/横跳
    detail: "SOXL↔SOXS 4 天反复翻向，空仓待不住，从一边跳到另一边"

lessons:
  - "入场时机：趋势未掉头不 fade 强势；等掉头确认信号（如跌破关键 MA/结构破位）再进"
  - "工具：多日观点禁用 3x 每日重置 ETF；改用正股/期权/1x 工具或缩短持有期"
  - "仓位：逆势单仓位减半，给容错空间，避免被涨势+杠杆双杀逼到投降"
  - "情绪止损纪律：预设机械止损价并前置，禁止在最大痛苦点临时交枪"
  - "禁止反手：平仓后强制空仓冷却，不在同一情绪周期内翻向反面"

repeat_warning: >
  ⚠⚠ 重复模式 — 与记忆 feedback_user_counter_trend_pattern 完全吻合
  （逆势 + 杠杆 ETF + 摊低成本 + 转折点投降 + 接飞刀）。M01/M02/M04/M08 四类同框。
  → 行动建议：逆势 + 杠杆 ETF 组合操作禁用 30 天；逆势单一律 1x 工具 + 预置机械止损；
    设月周转上限（如 ≤1x 账户）抑制对敲。

