  Long BABA — 从"低增长电商 + 监管折价"重估为"中国 AI-云第一龙头"。
  云/AI 加速（外部云 +40%、AI 收入连续 11 季三位数）+ Forward P/E 13.5× 便宜估值 +
  净现金资产负债表，左侧分批布局博 multiple 重估 + margin 拐点。短期利润坍塌、
  FCF 转负、技术下行 → 不追第一刀。

